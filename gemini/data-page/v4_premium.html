<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压记录本 - 顶级美学版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #F8FAFC 0%, #EEF3FB 100%);
            min-height: 100vh;
            color: #0F172A;
            -webkit-tap-highlight-color: transparent;
        }

        /* 顶级阴影系统 */
        .premium-shadow {
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 20px 25px -5px rgba(49, 130, 247, 0.04),
                inset 0 1px 1px rgba(255, 255, 255, 0.6);
        }

        /* 弥散光影背景 */
        .mesh-gradient {
            position: absolute;
            top: -20%; right: -20%;
            width: 300px; h-height: 300px;
            background: radial-gradient(circle, rgba(49, 130, 247, 0.08) 0%, transparent 70%);
            z-index: 0;
            filter: blur(40px);
        }

        /* 连续曲线卡片 */
        .squircle-card {
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
        }

        .active-scale { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .active-scale:active { transform: scale(0.95); }

        .chart-dot-glow {
            filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.6));
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">

    <!-- Header -->
    <nav class="h-24 flex items-end justify-between px-8 pb-4 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>
            <h1 class="text-xl font-black tracking-tight">万笋的记录</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 squircle-card flex items-center justify-center shadow-sm active-scale">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v.01M12 12v.01M12 19v.01" stroke-width="2.5"></path></svg>
            </div>
        </div>
    </nav>

    <main class="px-6 relative">
        <div class="mesh-gradient"></div>

        <!-- Hero Card 顶级重构 -->
        <section class="squircle-card p-8 mb-8 premium-shadow relative overflow-hidden active-scale">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-10">
                    <div class="space-y-1">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Latest Record</span>
                        <p class="text-xs font-semibold text-slate-500">今天 23:55</p>
                    </div>
                    <div class="px-3 py-1 bg-red-500/10 text-red-500 text-[10px] font-black rounded-full uppercase tracking-wider">
                        High BP
                    </div>
                </div>

                <div class="flex items-baseline mb-12">
                    <span class="text-8xl font-black tracking-tighter text-slate-900">158</span>
                    <span class="text-4xl text-slate-200 mx-4 font-light">/</span>
                    <span class="text-6xl font-black tracking-tighter text-slate-800">88</span>
                    <span class="text-sm font-bold text-slate-400 ml-4 tracking-widest uppercase">mmHg</span>
                </div>

                <div class="grid grid-cols-2 gap-8 border-t border-slate-100/50 pt-8">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"></path></svg>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pulse</span>
                            <p class="text-xl font-black text-slate-800">78 <small class="text-xs font-normal opacity-50">bpm</small></p>
                        </div>
                    </div>
                    <button class="bg-blue-600 text-white font-black text-[10px] rounded-2xl uppercase tracking-widest active-scale">
                        Analysis
                    </button>
                </div>
            </div>
        </section>

        <!-- 图表区块: 极简极美 -->
        <section class="mb-10">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">Trends</h3>
                <div class="flex gap-4">
                    <span class="text-xs font-bold text-blue-500">7D</span>
                    <span class="text-xs font-bold text-slate-300">30D</span>
                    <span class="text-xs font-bold text-slate-300">90D</span>
                </div>
            </div>
            
            <div class="squircle-card p-6 premium-shadow">
                <svg viewBox="0 0 300 120" class="w-full">
                    <!-- 安全区间阴影 (更加细腻) -->
                    <path d="M0 40 Q 150 35 300 40 L 300 80 Q 150 85 0 80 Z" fill="rgba(16, 185, 129, 0.04)" />
                    <!-- 动态感极强的曲线 -->
                    <path d="M20 55 C 60 50, 100 45, 140 38 C 180 30, 220 55, 260 48" fill="none" stroke="#3182F7" stroke-width="4" stroke-linecap="round" />
                    <circle cx="140" cy="38" r="6" fill="#EF4444" stroke="white" stroke-width="2.5" class="chart-dot-glow" />
                    <circle cx="260" cy="48" r="5" fill="#3182F7" stroke="white" stroke-width="2" />
                </svg>
            </div>
        </section>

        <!-- 记录列表: 去掉卡片背景，使用流式布局 -->
        <div class="space-y-6">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">History</h3>
                <button class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-blue-500 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 13l-7 7-7-7" stroke-width="3"></path></svg>
                </button>
            </div>

            <div class="flex items-center gap-6 group active-scale">
                <div class="w-14 h-14 squircle-card flex flex-col items-center justify-center premium-shadow">
                    <span class="text-[9px] font-black text-slate-300 uppercase">Fri</span>
                    <span class="text-sm font-black text-slate-700">17</span>
                </div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-black text-slate-900">158 / 88</span>
                        <span class="text-[10px] font-bold text-slate-300 uppercase">mmHg</span>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
                        <span class="text-[10px] font-black text-red-500 uppercase tracking-tighter">Level II Hypertension</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs font-black text-slate-400">23:55</p>
                </div>
            </div>
        </div>

    </main>

    <!-- FAB: 极致悬浮 -->
    <button class="fixed bottom-10 left-1/2 -translate-x-1/2 w-16 h-16 bg-[#3182F7] rounded-[24px] shadow-[0_20px_50px_rgba(49,130,247,0.4)] flex items-center justify-center text-white active-scale z-50">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6" stroke-width="3.5" stroke-linecap="round"></path></svg>
    </button>

</body>
</html>
