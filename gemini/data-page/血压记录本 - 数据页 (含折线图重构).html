<body class="pb-24">

    <!-- 顶部状态栏模拟 -->
    <div class="h-12 flex items-center justify-between px-6 text-slate-900 font-semibold sticky top-0 bg-[#EEF3FB]/80 backdrop-blur-md z-50">
        <span>9:41</span>
        <div class="flex gap-1.5 items-center">
            <div class="w-4 h-4 rounded-full border-2 border-slate-900"></div>
            <div class="w-5 h-2.5 rounded-sm bg-slate-900"></div>
        </div>
    </div>

    <main class="px-4 pt-2 text-slate-900">
        <!-- 头部 -->
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold">数据概览</h1>
                <p class="text-slate-500 text-sm mt-1">记录本：万笋 (51岁)</p>
            </div>
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm active-scale">
                    <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </header>

        <!-- 核心卡片 -->
        <section class="glass-card rounded-[32px] p-6 mb-6 relative overflow-hidden active-scale">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                        <span class="text-red-600 text-xs font-bold">血压偏高 (Grade 2)</span>
                    </div>
                </div>
                
                <div class="flex items-baseline font-bold tracking-tighter mb-6">
                    <span class="text-6xl text-slate-900">158</span>
                    <span class="text-3xl text-slate-300 mx-2">/</span>
                    <span class="text-5xl text-slate-800">88</span>
                    <span class="text-xl text-slate-400 ml-3 font-normal">mmHg</span>
                </div>

                <div class="flex items-center gap-8 border-t border-slate-200/50 pt-4">
                    <div>
                        <span class="text-slate-400 text-[10px] uppercase font-bold tracking-wider">最近心率</span>
                        <div class="flex items-baseline">
                            <span class="text-2xl font-bold text-slate-800">78</span>
                            <span class="text-xs text-slate-400 ml-1">bpm</span>
                        </div>
                    </div>
                    <div>
                        <span class="text-slate-400 text-[10px] uppercase font-bold tracking-wider">测量时间</span>
                        <div class="text-sm font-medium text-slate-600 mt-1">今天 23:55</div>
                    </div>
                </div>
            </div>
            <!-- 右侧装饰性物理条 -->
            <div class="absolute right-0 top-0 bottom-0 w-2 bg-gradient-to-bottom from-red-500 via-orange-400 to-green-500 opacity-10"></div>
        </section>

        <!-- 周期与图表区块 -->
        <section class="bg-white rounded-[32px] p-6 shadow-sm mb-6">
            <div class="flex justify-between items-center mb-6">
                <div class="flex bg-slate-100 p-1 rounded-xl w-48">
                    <button class="flex-1 py-1.5 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600">7天</button>
                    <button class="flex-1 py-1.5 rounded-lg text-xs font-medium text-slate-500">30天</button>
                    <button class="flex-1 py-1.5 rounded-lg text-xs font-medium text-slate-500">90天</button>
                </div>
                <button class="text-blue-500 text-xs font-bold flex items-center gap-1 active-scale">
                    下载图表
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>

            <!-- 重构后的折线图 (SVG 仿真) -->
            <div class="relative w-full h-48 mb-4">
                <svg class="w-full h-full" viewBox="0 0 300 120">
                    <!-- 参考线 135 -->
                    <line x1="0" y1="40" x2="300" y2="40" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"></line>
                    <text x="280" y="35" fill="#EF4444" font-size="8" opacity="0.6">135</text>
                    
                    <!-- 参考线 85 -->
                    <line x1="0" y1="80" x2="300" y2="80" stroke="#10B981" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"></line>
                    <text x="280" y="75" fill="#10B981" font-size="8" opacity="0.6">85</text>

                    <!-- 高压线 (优化后：线更粗，点更大) -->
                    <path class="chart-line" d="M20 50 L80 45 L140 35 L200 48 L260 42" fill="none" stroke="#3182F7" stroke-width="3" stroke-linecap="round"></path>
                    <circle cx="20" cy="50" r="5" fill="#3182F7" stroke="white" stroke-width="2"></circle>
                    <circle cx="80" cy="45" r="5" fill="#3182F7" stroke="white" stroke-width="2"></circle>
                    <circle cx="140" cy="35" r="6" fill="#EF4444" stroke="white" stroke-width="2"></circle> <!-- 异常点加大 -->
                    <circle cx="200" cy="48" r="5" fill="#3182F7" stroke="white" stroke-width="2"></circle>
                    <circle cx="260" cy="42" r="5" fill="#3182F7" stroke="white" stroke-width="2"></circle>

                    <!-- 低压线 -->
                    <path class="chart-line" d="M20 90 L80 88 L140 82 L200 92 L260 85" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"></path>
                    <circle cx="20" cy="90" r="4" fill="#10B981" stroke="white" stroke-width="2"></circle>
                    <circle cx="260" cy="85" r="4" fill="#10B981" stroke="white" stroke-width="2"></circle>
                </svg>
            </div>
            
            <div class="flex justify-between text-[10px] text-slate-400 font-bold px-2">
                <span>04/11</span>
                <span>04/13</span>
                <span>04/15</span>
                <span>今天</span>
            </div>
        </section>

        <!-- 历史明细 -->
        <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="font-bold text-slate-800">最近测量</h2>
            <button class="text-xs text-blue-500 font-bold active-scale">全部记录 &gt;</button>
        </div>

        <div class="space-y-3">
            <div class="bg-white p-4 rounded-[28px] shadow-sm flex items-center gap-4 active-scale">
                <div class="w-12 h-12 rounded-2xl bg-slate-50 flex flex-col items-center justify-center text-slate-400">
                    <span class="text-[9px] font-bold">今天</span>
                    <span class="text-xs font-bold text-slate-600">23:55</span>
                </div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-bold tracking-tighter text-slate-800">158 / 88</span>
                        <span class="text-[10px] text-slate-400">mmHg</span>
                    </div>
                    <div class="text-[10px] text-orange-500 font-bold">血压偏高 · 心率 78</div>
