    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --brand-blue: #3182F7; }
        body { font-family: 'Inter', sans-serif; background-color: #EEF3FB; }

            position: fixed;
            inset: 0;
            background: #FFFFFF;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 32px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .landing-overlay.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .input-group {
            background: #F8FAFC;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .input-group:focus-within {
            background: white;
            border-color: var(--brand-blue);
            box-shadow: 0 4px 20px rgba(49, 130, 247, 0.1);
        }
    </style>

<body class="overflow-hidden">

    <!-- 全屏逻辑引导 (这就是解决点击 Home 绕过的 UI 方案) -->
    <div id="join-guard" class="landing-overlay">
        <header class="h-11 flex items-center justify-between mb-12">
            <button onclick="alert(&#39;如果用户点退出，我们将重定向到小程序引导页&#39;)" class="text-slate-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5"></path></svg>
            </button>
            <span class="font-bold text-slate-900">接受邀请</span>
            <div class="w-6"></div>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center text-center -mt-20">
            <div class="w-20 h-20 bg-blue-50 rounded-[24px] flex items-center justify-center mb-8 relative">
                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl font-bold">万</div>
                <div class="absolute -bottom-2 -right-2 bg-green-500 border-4 border-white w-8 h-8 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"></path></svg>
                </div>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900">万笋 邀请你</h2>
            <p class="text-slate-500 mt-3 px-8 leading-relaxed">
                接受后，你可以实时查看这份健康记录和最近的就诊报告。
            </p>
        </div>

        <div class="space-y-6 mb-12">
            <div>
                <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-4 mb-2 block">你的家庭备注名</label>
                <div class="input-group rounded-[24px] p-4 flex items-center">
                    <input type="text" id="user-name" placeholder="例如：大儿子、女儿..." class="bg-transparent w-full outline-none font-bold text-slate-800">
                </div>
            </div>
            
            <button onclick="completeJoin()" class="w-full bg-[#3182F7] text-white py-5 rounded-[24px] text-lg font-bold shadow-xl shadow-blue-100 active-scale">
                同意并开始查看
            </button>
            <button onclick="alert(&#39;逻辑跳转：去小程序默认未加入页&#39;)" class="w-full py-2 text-slate-400 font-medium">暂不查看</button>
        </div>

        <p class="text-[10px] text-center text-slate-300">© 2026 Vital-Blue 安全加密连接</p>
    </div>

    <!-- 底部背景 (主Tab预览，会被遮罩挡住) -->
    <main class="opacity-30 blur-sm pointer-events-none p-4 pt-12">
        <div class="h-20 bg-white rounded-3xl mb-4"></div>
        <div class="h-40 bg-white rounded-3xl mb-4"></div>
        <div class="h-60 bg-white rounded-3xl"></div>
    </main>

    <script>
        function completeJoin() {
            const name = document.getElementById('user-name').value;
            if(!name) { alert('请输入备注名'); return; }
            
            const guard = document.getElementById('join-guard');
            guard.classList.add('hidden');
            
            // 模拟加入成功后的全屏沉浸反馈
            setTimeout(() => {
                alert('加入成功！现在你可以查看万笋的所有数据了。');
                location.reload(); // 模拟刷新到已加入状态
            }, 500);
        }

        // 模拟“再次点击卡片逻辑”
        window.onload = () => {
            const isAlreadyJoined = false; // 实际逻辑应调用云函数判断
            if(isAlreadyJoined) {
                document.getElementById('join-guard').classList.add('hidden');
            }
        }
    </script>


</body></html>
