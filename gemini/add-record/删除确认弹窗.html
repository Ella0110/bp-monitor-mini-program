<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压记录本 - 删除确认</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: rgba(15, 23, 42, 0.4); /* 模拟半透明遮罩 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            backdrop-filter: blur(8px);
        }

        .glass-dialog {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            animation: pop-up 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop-up {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .active-scale:active {
            transform: scale(0.96);
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="glass-dialog text-center">
        <!-- 警示图标 (极简版) -->
        <div class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </div>

        <h2 class="text-xl font-bold text-slate-900 mb-2">确定删除此记录？</h2>
        <p class="text-slate-400 text-xs leading-relaxed mb-10 px-2">
            删除后数据将无法恢复，并会影响您的健康趋势分析。
        </p>

        <!-- 垂直大按钮设计，适合操作 -->
        <div class="space-y-3">
            <button class="w-full py-4 bg-red-500 text-white rounded-2xl font-bold active-scale shadow-lg shadow-red-100">
                确定删除
            </button>
            <button class="w-full py-4 text-slate-400 font-bold active-scale">
                取消
            </button>
        </div>
    </div>

</body>
</html>
