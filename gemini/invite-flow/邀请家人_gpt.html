<!doctype html>

        <title>邀请家人查看</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");

            :root {
                --brand-blue: #3182f7;
                --bg-slate: #eef3fb;
            }

            body {
                font-family: "Inter", sans-serif;
                background:
                    radial-gradient(
                        circle at top right,
                        rgba(49, 130, 247, 0.1),
                        transparent 30%
                    ),
                    linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
            }

            .active-scale {
                transition: transform 0.15s ease;
            }

            .active-scale:active {
                transform: scale(0.97);
            }

            .glass-card {
                background: rgba(255, 255, 255, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(20px);
                box-shadow: 0 16px 40px rgba(49, 130, 247, 0.08);
            }

            .wechat-bg {
                background: #ededed;
                border-radius: 28px;
                padding: 18px;
                position: relative;
            }

            .wechat-bubble {
                background: #ffffff;
                border-radius: 10px 20px 20px 20px;
                padding: 12px;
                max-width: 250px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
                position: relative;
            }

            .wechat-bubble::before {
                content: "";
                position: absolute;
                left: -8px;
                top: 10px;
                border-width: 0 8px 8px 0;
                border-style: solid;
                border-color: transparent #ffffff transparent transparent;
            }

            .mini-card {
                background: #f8fafc;
                border: 1px solid #f1f5f9;
            }
        </style>
    </head>

                </div>
                <h1

                    邀请家人查看

                <p class="text-sm text-slate-500 mt-3 leading-relaxed px-4">
                    分享后，家人可以更方便地关注你的血压变化，及时了解最近记录。
                </p>

            <!-- 微信聊天预览 -->
            <section class="mb-10">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3
                        class="text-[11px] font-bold uppercase tracking-widest text-slate-400"
                    >
                        发送效果预览
                    </h3>
                    <span class="text-[11px] text-slate-300">微信聊天卡片</span>
                </div>

                <div class="wechat-bg">
                    <div class="flex items-start gap-3">
                        <div
                            class="w-10 h-10 bg-slate-300 rounded-md shrink-0"
                        ></div>
                        <div class="wechat-bubble">
                            <div class="flex items-center gap-2 mb-2">
                                <div

                            >

                            <div

            <!-- CTA 区 -->
            <section class="space-y-4">
                <button
                    class="w-full bg-[#3182F7] text-white py-5 rounded-[28px] text-lg font-bold shadow-xl shadow-blue-200 active-scale flex items-center justify-center gap-3"

                        ></path>

                </button>

                <button
                    class="w-full py-4 text-slate-400 font-medium active-scale"
                    onclick="history.back()"
                >
                    取消并返回
                </button>

                <p class="text-[11px] text-center text-slate-400">
                    已自动生成安全邀请链接，家人点击后即可加入查看
                </p>
            </section>
