<body class="pb-24">
    <!-- 状态栏模拟 (胶囊位预留) -->
    <div class="h-10"></div>
    <div class="h-11 flex items-center justify-between px-6 sticky top-10 z-40">
        <h1 class="text-xl font-bold text-slate-900">家庭档案</h1>
        <div class="w-20 h-8 bg-black/5 rounded-full border border-black/10"></div>
    </div>

    <main class="px-4 mt-4">
        <!-- 核心档案卡片 -->
        <section class="bg-white rounded-[32px] p-6 shadow-sm mb-6 relative overflow-hidden">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-blue-100">
                    万
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h2 class="text-xl font-bold">万笋</h2>
                        <span class="text-xs text-slate-400 font-medium">51岁 · 1975</span>
                    </div>
                    <!-- 紧急联系人 (回归并增强) -->
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="text-[10px] text-red-500 font-bold bg-red-50 px-1.5 py-0.5 rounded">紧急联系</span>
                        <span class="text-xs font-bold text-slate-600">新一 · 1845...489</span>
                    </div>
                </div>
                <button class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-blue-500 active-scale">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"></path></svg>
                </button>
            </div>

            <!-- 数据摘要 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">当前血压</span>
                    <span class="text-xl font-bold text-red-500">167/117</span>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">当前心率</span>
                    <span class="text-xl font-bold text-slate-800">79</span>
                </div>
            </div>
            
            <!-- 紧急一键拨号 (适老化增强) -->
            <button class="w-full mt-6 py-4 rounded-2xl emergency-btn text-white font-bold flex items-center justify-center gap-2 active-scale">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27 11.72 11.72 0 003.7.59 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.72 11.72 0 00.59 3.7 1 1 0 01-.27 1.11l-2.2 2.2z"></path></svg>
                呼叫紧急联系人
            </button>
        </section>

        <!-- 成员管理 & 快捷设置 (回归) -->
        <div class="flex items-center justify-between mb-4 px-2">
            <h3 class="text-sm font-bold text-slate-800">成员与权限</h3>
            <span class="text-xs text-slate-400">最多 10 人</span>
        </div>

        <div class="space-y-4">
            <!-- 成员条目 -->
            <div class="bg-white p-4 rounded-[28px] shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">我</div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800">我 (管理员)</h4>
                    <p class="text-[10px] text-slate-400">拥有所有权限</p>
                </div>
                <button class="px-4 py-2 bg-slate-50 text-slate-400 rounded-xl text-xs font-bold opacity-30 cursor-not-allowed">修改</button>
            </div>

            <!-- 成员条目 (带快捷设置) -->
            <div class="bg-white p-4 rounded-[28px] shadow-sm">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-white border-2 border-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold">h</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800">hank</h4>
                        <p class="text-[10px] text-slate-400">已加入家庭</p>
                    </div>
                    <button class="px-4 py-2 bg-blue-50 text-blue-500 rounded-xl text-xs font-bold active-scale">权限</button>
                </div>
                <!-- 快捷设置区 (回归) -->
                <div class="flex gap-2 pt-3 border-t border-slate-50">
                    <div class="flex-1 bg-slate-50 p-2 rounded-xl flex items-center justify-between px-3">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">录入权限</span>
                        <div class="w-8 h-4 bg-blue-500 rounded-full relative p-0.5">
                            <div class="w-3 h-3 bg-white rounded-full ml-auto shadow-sm"></div>
                        </div>
                    </div>
                    <div class="flex-1 bg-slate-50 p-2 rounded-xl flex items-center justify-between px-3">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">编辑权限</span>
                        <div class="w-8 h-4 bg-slate-200 rounded-full relative p-0.5">
                            <div class="w-3 h-3 bg-white rounded-full shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 邀请按钮 -->
            <button class="w-full py-4 border-2 border-dashed border-slate-200 rounded-[28px] text-blue-500 font-bold flex items-center justify-center gap-2 active-scale">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6" stroke-width="2.5"></path></svg>
                邀请家人加入
            </button>
        </div>

    </main>
