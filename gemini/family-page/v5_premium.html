<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压记录本 - 家庭档案 (顶级美学版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(160deg, #F8FAFC 0%, #EEF3FB 100%); min-height: 100vh; color: #0F172A; -webkit-tap-highlight-color: transparent; }
        .premium-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 20px 25px -5px rgba(49, 130, 247, 0.04); }
        .squircle-card { border-radius: 44px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px); border: 0.5px solid rgba(255, 255, 255, 0.6); }
        .active-scale { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .active-scale:active { transform: scale(0.95); }
        .avatar-glow { box-shadow: 0 10px 25px rgba(49, 130, 247, 0.2); }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32 px-6 overflow-x-hidden">

    <!-- Header: 顶级留白 -->
    <header class="h-28 flex items-end justify-between pb-4">
        <h1 class="text-3xl font-black tracking-tighter">Family</h1>
        <div class="flex gap-3">
            <button class="w-11 h-11 squircle-card flex items-center justify-center shadow-sm active-scale">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2.5"></path></svg>
            </button>
        </div>
    </header>

    <main class="space-y-10 relative">
        
        <!-- 档案卡片: 垂直层级重塑 -->
        <section class="squircle-card p-10 premium-shadow active-scale">
            <div class="flex flex-col items-center text-center mb-10">
                <div class="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center text-white text-4xl font-black avatar-glow pulse-red mb-6">万</div>
                <h2 class="text-2xl font-black tracking-tight">万笋 <span class="text-xs font-bold text-slate-400 align-middle ml-2 uppercase">51 Yrs</span></h2>
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mt-2">Personal Health Profile</p>
            </div>

            <div class="grid grid-cols-2 gap-10">
                <div class="space-y-1 text-center">
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block">Current BP</span>
                    <p class="text-2xl font-black text-red-500">167/117</p>
                </div>
                <div class="space-y-1 text-center border-l border-slate-100/50">
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block">Heart Rate</span>
                    <p class="text-2xl font-black text-slate-800">79 <small class="text-xs font-normal opacity-30">bpm</small></p>
                </div>
            </div>

            <div class="mt-10 pt-8 border-t border-slate-100/50 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                    <span class="text-[10px] font-black text-red-400 uppercase tracking-widest">Emergency Contact</span>
                </div>
                <span class="text-sm font-black text-slate-700">新一 · 1845...</span>
            </div>
        </section>

        <!-- 成员管理: 悬浮式头像组 -->
        <section>
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-300 mb-6 px-4">Family Members</h3>
            <div class="flex gap-6 overflow-x-auto pb-4 px-2 no-scrollbar">
                <div class="flex flex-col items-center gap-3 active-scale">
                    <div class="w-16 h-16 bg-blue-600 rounded-[24px] flex items-center justify-center text-white font-black avatar-glow">Me</div>
                    <span class="text-[9px] font-black text-slate-900 uppercase">Admin</span>
                </div>
                <div class="flex flex-col items-center gap-3 active-scale">
                    <div class="w-16 h-16 bg-white rounded-[24px] flex items-center justify-center text-blue-500 font-black shadow-md border border-white/50">H</div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Hank</span>
                </div>
                <div class="flex flex-col items-center gap-3 active-scale">
                    <div class="w-16 h-16 bg-white rounded-[24px] flex items-center justify-center text-blue-500 font-black shadow-md border border-white/50">M</div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Witch</span>
                </div>
                <div class="flex flex-col items-center gap-3 active-scale">
                    <div class="w-16 h-16 border-2 border-dashed border-slate-200 rounded-[24px] flex items-center justify-center text-slate-300">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6" stroke-width="3"></path></svg>
                    </div>
                    <span class="text-[9px] font-black text-blue-500 uppercase">Invite</span>
                </div>
            </div>
        </section>

        <!-- 核心服务卡片 -->
        <section class="space-y-4">
            <div class="squircle-card p-8 flex items-center justify-between premium-shadow active-scale">
                <div class="space-y-1">
                    <h4 class="text-lg font-black tracking-tight">Clinical Report</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest leading-relaxed">AI Powered Health Analysis & Summary</p>
                </div>
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2.5"></path></svg>
                </div>
            </div>
        </section>

    </main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-white/60 backdrop-blur-3xl border-t border-slate-100 px-16 flex items-center justify-between z-50">
        <div class="flex flex-col items-center gap-1 text-slate-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="2"/></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Summary</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-blue-600">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Family</span>
        </div>
    </nav>

</body>
</html>
