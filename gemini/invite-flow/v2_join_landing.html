<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接受邀请 V2 - 信任感增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --brand-blue: #3182F7; --danger-red: #EF4444; }
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        
        .status-badge { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-8 pt-16 flex flex-col h-screen overflow-hidden">

    <header class="flex items-center gap-4 mb-12">
        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl font-bold">万</div>
        <div>
            <h1 class="text-xl font-extrabold text-slate-900">接受查看邀请</h1>
            <p class="text-xs text-slate-400 font-medium">来自家人：万笋</p>
        </div>
    </header>

    <!-- 优化：健康预览预览卡 (增加紧迫感与价值感) -->
    <section class="bg-slate-50 border border-slate-100 rounded-[32px] p-6 mb-12">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">当前状态预览</span>
            <span class="text-[10px] px-2 py-0.5 bg-red-100 text-red-600 rounded-md font-bold status-badge">异常待关注</span>
        </div>
        <div class="flex items-baseline gap-2 mb-4">
            <span class="text-4xl font-black text-slate-900 blur-[2px]">167 / 117</span>
            <span class="text-sm text-slate-400">mmHg</span>
        </div>
        <p class="text-xs text-slate-500 leading-relaxed">
            加入后，你可以查看到具体的时间明细、趋势图表以及医生建议。
        </p>
    </section>

    <div class="flex-1 space-y-6">
        <div>
            <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-4 mb-2 block">你的称呼</label>
            <input type="text" placeholder="例如：大儿子、健康助理" class="w-full bg-slate-50 rounded-[24px] p-5 font-bold text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all border border-transparent">
        </div>
        
        <button class="w-full bg-[#3182F7] text-white py-5 rounded-[24px] text-lg font-bold shadow-xl shadow-blue-100 active-scale">
            确认并进入数据页
        </button>
        <button class="w-full py-2 text-slate-300 font-medium text-sm active-scale">暂不加入</button>
    </div>

    <!-- 优化：增加安全背书 -->
    <footer class="mt-auto pt-10 text-center">
        <div class="flex items-center justify-center gap-1.5 mb-2">
            <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">隐私安全已加密</span>
        </div>
        <p class="text-[9px] text-slate-300 px-8">本数据仅在家庭成员间加密共享，未经授权任何第三方无法访问</p>
    </footer>

</body>
</html>
