<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>接受邀请 - 顶级美学版</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background: #ffffff;
                min-height: 100vh;
                color: #0f172a;
                overflow: hidden;
            }
            .immersive-bg {
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(
                        circle at 20% 10%,
                        rgba(49, 130, 247, 0.08) 0%,
                        transparent 40%
                    ),
                    radial-gradient(
                        circle at 80% 80%,
                        rgba(16, 185, 129, 0.05) 0%,
                        transparent 40%
                    );
                z-index: -1;
            }
            .squircle-card {
                border-radius: 44px;
                background: rgba(255, 255, 255, 0.6);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(0, 0, 0, 0.03);
            }
            .premium-shadow {
                box-shadow: 0 30px 60px -12px rgba(49, 130, 247, 0.12);
            }
            .art-blur {
                filter: blur(8px);
                opacity: 0.3;
                transition: all 1s ease;
            }
            .active-scale:active {
                transform: scale(0.96);
                transition: 0.1s;
            }

            @keyframes floating {
                0%,
                100% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-10px);
                }
            }
            .float-anim {
                animation: floating 4s ease-in-out infinite;
            }
        </style>
    </head>
    <body class="p-8 pt-20 flex flex-col items-center">
        <div class="immersive-bg"></div>

        <header class="text-center mb-12 space-y-4">
            <div
                class="w-20 h-20 bg-blue-600 rounded-[28px] flex items-center justify-center text-white text-3xl font-black premium-shadow float-anim mx-auto"
            >
                万
            </div>
            <div class="space-y-1">
                <h1 class="text-2xl font-black tracking-tight">
                    Family Invitation
                </h1>
                <p
                    class="text-xs text-slate-400 font-bold uppercase tracking-widest leading-loose px-4"
                >
                    万笋 邀请你共同关注健康状态
                </p>
            </div>
        </header>

        <!-- 优化：艺术化健康预览预览 -->
        <section
            class="w-full squircle-card p-10 mb-12 relative overflow-hidden"
        >
            <div class="absolute top-0 right-0 p-4">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
            </div>

            <span
                class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-6 block text-center"
                >Real-time Preview</span
            >

            <div class="flex flex-col items-center gap-2">
                <div class="flex items-baseline gap-2 art-blur" id="blur-box">
                    <span class="text-5xl font-black text-slate-900"
                        >167/117</span
                    >
                    <span class="text-sm font-bold text-slate-400">mmHg</span>
                </div>
                <div
                    class="px-4 py-1.5 bg-red-500/10 text-red-500 text-[10px] font-black rounded-full uppercase tracking-widest mt-4"
                >
                    Abnormal Alert
                </div>
            </div>

            <p
                class="text-[10px] text-slate-400 font-medium leading-relaxed text-center mt-8 px-2"
            >
                Accepting the invitation allows you to monitor vital signs,
                trends, and received professional clinical advice.
            </p>
        </section>

        <main class="w-full space-y-6">
            <div class="space-y-2 px-4">
                <label
                    class="text-[9px] font-black text-slate-300 uppercase tracking-widest"
                    >Your Identity</label
                >
                <input
                    type="text"
                    placeholder="e.g. Son, Daughter, Caretaker"
                    class="w-full bg-slate-50 border-0 rounded-[24px] p-5 font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                />
            </div>

            <button
                class="w-full bg-[#3182F7] text-white py-5 rounded-[28px] text-sm font-black uppercase tracking-[0.2em] shadow-2xl shadow-blue-200 active-scale"
            >
                Join & Connect
            </button>

            <button
                class="w-full py-2 text-slate-300 font-black text-[10px] uppercase tracking-widest active-scale"
            >
                Decline
            </button>
        </main>

        <footer class="mt-auto pb-10 flex items-center gap-2 opacity-30">
            <svg
                class="w-3 h-3 text-green-500"
                fill="currentColor"
                viewBox="0 0 20 20"
            >
                <path
                    fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z"
                    clip-rule="evenodd"
                ></path>
            </svg>
            <span class="text-[8px] font-black uppercase tracking-[0.3em]"
                >End-to-End Encryption</span
            >
        </footer>
    </body>
</html>
