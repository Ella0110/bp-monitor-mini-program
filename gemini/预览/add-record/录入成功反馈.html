<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压记录本 - 录入成功反馈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #EEF3FB;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .glass-toast {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 24px 48px;
            box-shadow: 0 20px 40px rgba(49, 130, 247, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-icon {
            width: 56px;
            height: 56px;
            background: #10B981;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            animation: scale-up 0.4s 0.2s both;
        }

        @keyframes pop-in {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes scale-up {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .refresh-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #3182F7;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fade-up 1.5s 0.8s forwards;
        }

        @keyframes fade-up {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body>

    <div class="glass-toast">
        <div class="success-icon">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </div>
        <span class="text-xl font-bold text-slate-800">记录已保存</span>
    </div>

    <div class="refresh-hint">数据已同步更新</div>

</body>
</html>
