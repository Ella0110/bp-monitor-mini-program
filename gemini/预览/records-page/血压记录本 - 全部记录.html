<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>血压记录本 - 全部记录 (功能增强版)</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background: #f8fafc;
                min-height: 100vh;
                color: #0f172a;
            }
            .premium-shadow {
                box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.02),
                    0 20px 25px -5px rgba(49, 130, 247, 0.03);
            }
            .squircle-card {
                border-radius: 24px;
                background: white;
                border: 0.5px solid rgba(0, 0, 0, 0.03);
            }
            .active-scale {
                transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .active-scale:active {
                transform: scale(0.98);
            }
            .sticky-header {
                position: sticky;
                top: 110px;
                z-index: 30;
                background: rgba(248, 250, 252, 0.9);
                backdrop-filter: blur(20px);
            }
            ::-webkit-scrollbar {
                display: none;
            }

            .slide-up {
                animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }
            @keyframes slideUp {
                from {
                    transform: translateY(100%);
                }
                to {
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body class="pb-10 overflow-x-hidden">
        <nav
            class="h-28 flex items-end justify-between px-8 pb-4 sticky top-0 z-50 bg-white/90 backdrop-blur-3xl border-b border-slate-50"
        >
            <div class="flex items-center gap-4">
                <button
                    class="w-10 h-10 squircle-card flex items-center justify-center active-scale shadow-sm"
                >
                    <svg
                        class="w-5 h-5 text-slate-400"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            d="M15 19l-7-7 7-7"
                            stroke-width="3"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        ></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none">
                        全部记录
                    </h1>
                    <span
                        class="text-[11px] font-black text-slate-300 uppercase tracking-widest mt-1 block"
                        >128 条记录</span
                    >
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="w-10 h-10 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center active-scale"
                    title="导入数据"
                >
                    <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0l-4 4m4-4v12"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        ></path>
                    </svg>
                </button>
                <button
                    class="w-10 h-10 bg-slate-50 text-blue-600 rounded-2xl flex items-center justify-center active-scale"
                    onclick="toggleExport()"
                >
                    <svg
                        class="w-5 h-5"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <circle cx="12" cy="5" r="1.8"></circle>
                        <circle cx="12" cy="12" r="1.8"></circle>
                        <circle cx="12" cy="19" r="1.8"></circle>
                    </svg>
                </button>
            </div>
        </nav>

        <main class="px-6 pt-6">
            <section
                class="squircle-card p-6 mb-8 premium-shadow flex justify-between items-center bg-gradient-to-br from-white to-slate-50"
            >
                <div class="flex gap-4">
                    <div class="text-center">
                        <p
                            class="text-[11px] font-black text-slate-300 uppercase"
                        >
                            正常
                        </p>
                        <p class="text-2xl font-black text-emerald-500">92</p>
                    </div>
                    <div class="w-px h-8 bg-slate-100 self-center"></div>
                    <div class="text-center">
                        <p
                            class="text-[11px] font-black text-slate-300 uppercase"
                        >
                            高压
                        </p>
                        <p class="text-2xl font-black text-red-500">36</p>
                    </div>
                </div>
                <button
                    class="text-xs font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-xl active-scale"
                >
                    批量管理
                </button>
            </section>

            <div class="mb-12">
                <div
                    class="sticky-header py-4 px-2 mb-6 flex justify-between items-center"
                >
                    <h3
                        class="text-xs font-black uppercase tracking-[0.4em] text-blue-500"
                    >
                        2026 四月
                    </h3>
                    <span class="text-[11px] font-bold text-slate-300"
                        >24 条记录</span
                    >
                </div>

                <div class="space-y-6">
                    <div class="flex items-center gap-6 group active-scale">
                        <div
                            class="w-14 h-14 squircle-card flex flex-col items-center justify-center premium-shadow"
                        >
                            <span
                                class="text-[10px] font-black text-slate-300 uppercase"
                                >周五</span
                            >
                            <span class="text-base font-black text-slate-700"
                                >17</span
                            >
                        </div>
                        <div class="flex-1">
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-black text-slate-900"
                                    >158 / 88</span
                                >
                                <span
                                    class="text-xs font-bold text-slate-300 uppercase"
                                    >mmHg</span
                                >
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <div
                                    class="w-1.5 h-1.5 rounded-full bg-red-500"
                                ></div>
                                <span
                                    class="text-xs font-black text-red-500 uppercase tracking-tighter"
                                    >II 级高压</span
                                >
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-400">
                                23:55
                            </p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 group active-scale">
                        <div
                            class="w-14 h-14 squircle-card flex flex-col items-center justify-center premium-shadow"
                        >
                            <span
                                class="text-[10px] font-black text-slate-300 uppercase"
                                >周四</span
                            >
                            <span class="text-base font-black text-slate-700"
                                >16</span
                            >
                        </div>
                        <div class="flex-1">
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-black text-slate-900"
                                    >121 / 78</span
                                >
                                <span
                                    class="text-xs font-bold text-slate-300 uppercase"
                                    >mmHg</span
                                >
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <div
                                    class="w-1.5 h-1.5 rounded-full bg-emerald-500"
                                ></div>
                                <span
                                    class="text-xs font-black text-emerald-500 uppercase tracking-tighter"
                                    >正常</span
                                >
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-400">
                                08:30
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center py-10 gap-3 opacity-20">
                <div
                    class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"
                ></div>
                <span
                    class="text-[11px] font-black uppercase tracking-widest text-slate-400"
                    >Loading History</span
                >
            </div>
        </main>

        <div id="exportPanel" class="fixed inset-0 z-[100] hidden">
            <div
                class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"
                onclick="toggleExport()"
            ></div>
            <div
                class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 slide-up"
            >
                <div
                    class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-10"
                ></div>

                <h4 class="text-xl font-black tracking-tight mb-2">
                    导出数据报告
                </h4>
                <p class="text-sm text-slate-400 font-medium mb-8">
                    选择需要导出的时间范围，支持 Excel 与 PDF 格式
                </p>

                <div class="grid grid-cols-3 gap-4 mb-10">
                    <button
                        class="flex flex-col items-center gap-4 p-6 squircle-card border-2 border-slate-50 hover:border-blue-500 transition-all active-scale group"
                    >
                        <span
                            class="text-2xl font-black text-slate-800 group-hover:text-blue-600"
                            >7</span
                        >
                        <span
                            class="text-[11px] font-black text-slate-300 uppercase tracking-widest"
                            >Days</span
                        >
                    </button>
                    <button
                        class="flex flex-col items-center gap-4 p-6 squircle-card border-2 border-slate-50 hover:border-blue-500 transition-all active-scale group"
                    >
                        <span
                            class="text-2xl font-black text-slate-800 group-hover:text-blue-600"
                            >30</span
                        >
                        <span
                            class="text-[11px] font-black text-slate-300 uppercase tracking-widest"
                            >Days</span
                        >
                    </button>
                    <button
                        class="flex flex-col items-center gap-4 p-6 squircle-card border-2 border-slate-50 hover:border-blue-500 transition-all active-scale group"
                    >
                        <span
                            class="text-2xl font-black text-slate-800 group-hover:text-blue-600"
                            >90</span
                        >
                        <span
                            class="text-[11px] font-black text-slate-300 uppercase tracking-widest"
                            >Days</span
                        >
                    </button>
                </div>

                <div class="flex gap-4">
                    <button
                        class="flex-1 py-5 bg-slate-900 text-white rounded-2xl font-black text-sm active-scale"
                    >
                        确认下载
                    </button>
                    <button
                        class="flex-1 py-5 bg-slate-50 text-slate-400 rounded-2xl font-black text-sm active-scale"
                        onclick="toggleExport()"
                    >
                        取消
                    </button>
                </div>
            </div>
        </div>

        <script>
            function toggleExport() {
                const panel = document.getElementById("exportPanel");
                panel.classList.toggle("hidden");
            }
        </script>
    </body>
</html>
