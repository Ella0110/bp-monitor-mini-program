<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血压就诊报告 - 顶级美学版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #0F172A; -webkit-tap-highlight-color: transparent; }
        .premium-border { border: 0.5px solid rgba(0, 0, 0, 0.05); }
        .data-serif { font-family: 'Playfair Display', serif; }
        .bg-ethereal { background: linear-gradient(180deg, #F8FAFC 0%, #FFFFFF 100%); }
        .active-scale:active { transform: scale(0.98); transition: 0.1s; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-40 bg-ethereal">

    <main class="px-8 pt-16 space-y-16">
        
        <!-- 报告头 -->
        <header class="space-y-4">
            <div class="flex justify-between items-end">
                <h1 class="text-4xl font-black tracking-tighter leading-none">Health<br>Report</h1>
                <div class="text-right">
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Issue Date</span>
                    <p class="text-xs font-bold text-slate-500">APR 18, 2026</p>
                </div>
            </div>
            <div class="h-1 bg-blue-600 w-12 rounded-full"></div>
        </header>

        <!-- 核心统计: 极致的大字对比 -->
        <section class="space-y-12">
            <div class="grid grid-cols-2 gap-12">
                <div class="space-y-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Average BP</span>
                    <div class="flex items-baseline gap-1">
                        <span class="text-5xl font-black data-serif">152</span>
                        <span class="text-xl text-slate-200">/</span>
                        <span class="text-3xl font-bold text-slate-700 data-serif">103</span>
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Abnormal</span>
                    <div class="flex items-baseline gap-2">
                        <span class="text-5xl font-black text-red-500 data-serif">04</span>
                        <span class="text-xs font-bold text-slate-300 uppercase">Times</span>
                    </div>
                </div>
            </div>

            <!-- 警示卡片: 优雅的非对称设计 -->
            <div class="p-8 bg-red-500 rounded-[32px] text-white space-y-3 shadow-[0_20px_40px_rgba(239,68,68,0.15)] relative overflow-hidden">
                <svg class="absolute -right-4 -bottom-4 w-32 h-32 opacity-10" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"></path></svg>
                <h3 class="text-sm font-black uppercase tracking-widest opacity-80">Risk Assessment</h3>
                <p class="text-lg font-bold leading-tight">Critical blood pressure levels detected. Immediate medical consultation recommended.</p>
            </div>
        </section>

        <!-- 详细列表: 类似奢侈品画册的排版 -->
        <section class="space-y-8">
            <h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300 border-b pb-4">Daily Logs</h3>
            
            <div class="flex justify-between items-center group">
                <div class="space-y-1">
                    <p class="text-xs font-black text-slate-400">APR 17 <span class="mx-2 opacity-30">|</span> 13:44</p>
                    <h4 class="text-2xl font-black text-slate-800 tracking-tighter">123 / 89</h4>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Attention</span>
                    <p class="text-xs font-bold text-slate-400 mt-1">87 bpm</p>
                </div>
            </div>

            <div class="flex justify-between items-center group">
                <div class="space-y-1">
                    <p class="text-xs font-black text-slate-400">APR 17 <span class="mx-2 opacity-30">|</span> 08:47</p>
                    <h4 class="text-2xl font-black text-slate-800 tracking-tighter">155 / 94</h4>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">High Risk</span>
                    <p class="text-xs font-bold text-slate-400 mt-1">84 bpm</p>
                </div>
            </div>
        </section>

    </main>

    <!-- 底部固定的导出栏 -->
    <div class="fixed bottom-0 left-0 right-0 p-8 bg-white/80 backdrop-blur-xl border-t border-slate-50 flex flex-col gap-6 z-50">
        <div class="flex justify-between items-center">
            <span class="text-sm font-black tracking-tight">Privacy Guard</span>
            <div class="w-12 h-6 bg-blue-600 rounded-full relative p-1">
                <div class="w-4 h-4 bg-white rounded-full shadow-sm ml-auto"></div>
            </div>
        </div>
        <button class="w-full bg-[#0F172A] text-white py-5 rounded-[24px] font-black text-xs uppercase tracking-[0.2em] active-scale shadow-2xl">
            Save Digital Report
        </button>
    </div>

</body>
</html>
